plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

def applyDevServerConfig = tasks.register('applyDevServerConfig', Exec) {
    group = 'neoforge'
    description = 'Sets creative mode, OP, and FTB Chunks world config on the dev server'
    workingDir layout.projectDirectory.asFile
    commandLine 'powershell.exe', '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', 'scripts/Apply-DevServerConfig.ps1'
}

def applyDevClientConfig = tasks.register('applyDevClientConfig', Exec) {
    group = 'neoforge'
    description = 'Sets dev client window to bordered fullscreen (windowed, screen size)'
    workingDir layout.projectDirectory.asFile
    commandLine 'powershell.exe', '-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', 'scripts/Apply-DevClientConfig.ps1'
}

def devClientWidth = findProperty('devClientWidth') ?: '1920'
def devClientHeight = findProperty('devClientHeight') ?: '1080'
def devClientWindowFile = layout.projectDirectory.file('scripts/dev/client-window.properties').asFile
if (devClientWindowFile.exists()) {
    def windowProps = new Properties()
    devClientWindowFile.withInputStream { windowProps.load(it) }
    devClientWidth = windowProps.getProperty('width', devClientWidth)
    devClientHeight = windowProps.getProperty('height', devClientHeight)
}

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            ideName = 'Client 1'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            // "neoforge-" in the default ignoreList also matches Xaero jars like
            // xaeros-minimap-neoforge-1.21.1-*.jar — narrow it to "neoforge-21."
            // so only the actual NeoForge runtime jars are skipped.
            jvmArgument '-DignoreList=mixinextras-neoforge-0.5.3.jar,client-extra,neoforge-21.'
            programArgument '--username'
            programArgument 'Dev'
            programArgument '--width'
            programArgument devClientWidth
            programArgument '--height'
            programArgument devClientHeight
        }

        client2 {
            client()
            ideName = 'Client 2'
            gameDirectory = project.layout.projectDirectory.dir('run-client2')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            jvmArgument '-DignoreList=mixinextras-neoforge-0.5.3.jar,client-extra,neoforge-21.'
            programArgument '--username'
            programArgument 'DevPlayer2'
            programArgument '--width'
            programArgument devClientWidth
            programArgument '--height'
            programArgument devClientHeight
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            // NOTE: dev server config is applied in-process by scripts/run-server.ps1
            // before Gradle starts. We intentionally do NOT wire applyDevServerConfig
            // as taskBefore here: spawning a fresh powershell.exe from the Gradle Exec
            // task can hang on Windows, which blocked :runServer from ever starting.
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

repositories {
    maven {
        url = 'https://maven.ftb.dev/releases'
        content {
            includeGroup('dev.ftb.mods')
        }
    }
    maven {
        url = 'https://maven.ftb.dev/snapshots'
        content {
            includeGroup('dev.ftb.mods')
        }
    }
    maven {
        url = 'https://maven.architectury.dev'
        content {
            includeGroup('dev.architectury')
        }
    }
    maven {
        url = 'https://api.modrinth.com/maven'
        content {
            includeGroup('maven.modrinth')
        }
    }
    maven {
        url = 'https://cursemaven.com'
        content {
            includeGroup('curse.maven')
        }
    }
}

dependencies {
    implementation "dev.ftb.mods:ftb-library-neoforge:${ftb_library_version}"
    implementation "dev.ftb.mods:ftb-teams-neoforge:${ftb_teams_version}"
    implementation "dev.ftb.mods:ftb-chunks-neoforge:${ftb_chunks_version}"

    compileOnly "maven.modrinth:lightmans-currency:${lightmanscurrency_version}"
    localRuntime "maven.modrinth:lightmans-currency:${lightmanscurrency_version}"

    // Open Parties and Claims: no source or tagged releases are published upstream
    // (see https://github.com/thexaero/open-parties-and-claims), and the exact
    // curse.maven file ID for this version wasn't confirmed, so it's vendored
    // locally rather than resolved from a repository.
    compileOnly files("libs-provided/open-parties-and-claims-neoforge-1.21.1-${opc_version}.jar")
    localRuntime files("libs-provided/open-parties-and-claims-neoforge-1.21.1-${opc_version}.jar")

    // Client-only test-client mods: Xaero's Minimap + World Map and the
    // FTB Chunks compat addon that renders FTB Chunks claims on Xaero's maps.
    // Added to the per-run additional runtime classpath of the client runs only,
    // so they never load on the dedicated server (they are client-side mods).
    clientAdditionalRuntimeClasspath "maven.modrinth:xaeros-minimap:${xaeros_minimap_version}"
    clientAdditionalRuntimeClasspath "maven.modrinth:xaeros-world-map:${xaeros_worldmap_version}"
    clientAdditionalRuntimeClasspath "curse.maven:ftb-chunks-x-xaeros-compat-${ftb_xaero_compat_project}:${ftb_xaero_compat_file}"

    client2AdditionalRuntimeClasspath "maven.modrinth:xaeros-minimap:${xaeros_minimap_version}"
    client2AdditionalRuntimeClasspath "maven.modrinth:xaeros-world-map:${xaeros_worldmap_version}"
    client2AdditionalRuntimeClasspath "curse.maven:ftb-chunks-x-xaeros-compat-${ftb_xaero_compat_project}:${ftb_xaero_compat_file}"
}

var generateModMetadata = tasks.register('generateModMetadata', ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            ftb_library_version    : ftb_library_version,
            ftb_teams_version      : ftb_teams_version,
            ftb_chunks_version     : ftb_chunks_version,
            opc_version            : opc_version,
            lightmanscurrency_version: lightmanscurrency_version
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from 'src/main/templates'
    into 'build/generated/sources/modMetadata'
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
