modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="malik"
description='''Connects Lightman's Currency with FTB Chunks + FTB Teams, or Open Parties and Claims, for paid claims, upkeep, and protection management.'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftblibrary"
type="optional"
versionRange="[${ftb_library_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbteams"
type="optional"
versionRange="[${ftb_teams_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="ftbchunks"
type="optional"
versionRange="[${ftb_chunks_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="openpartiesandclaims"
type="optional"
versionRange="[${opc_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="lightmanscurrency"
type="required"
versionRange="[${lightmanscurrency_version},)"
ordering="NONE"
side="BOTH"

[[mixins]]
config="lc_claim_economy.mixins.json"
